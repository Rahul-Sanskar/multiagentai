services:
  - type: web
    name: multiagentai-backend
    env: python
    region: oregon
    plan: free
    # Install CPU-only torch first (avoids 2 GB CUDA wheel).
    # Then install everything else with --only-binary=:all: so pip never
    # attempts a source/Cython build — if a wheel doesn't exist for the
    # Python version, pip fails fast with a clear error instead of a
    # cryptic Cython compile failure.
    buildCommand: >
      pip install --upgrade pip &&
      pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu --only-binary=:all: &&
      pip install -r requirements.txt --only-binary=:all:
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./prod.db
      - key: GROQ_API_KEY
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: IMPACT_FETCH_DELAY_SECONDS
        value: "3600"
      - key: ALLOWED_ORIGINS_STR
        value: "*"
