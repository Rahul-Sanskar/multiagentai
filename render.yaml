services:
  - type: web
    name: multiagentai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: >-
      pip install --upgrade pip setuptools wheel &&
      pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu --only-binary=:all: &&
      pip install -r requirements.txt --only-binary=:all:
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./prod.db
      - key: GROQ_API_KEY
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS_STR
        value: "*"
      - key: IMPACT_FETCH_DELAY_SECONDS
        value: "3600"
