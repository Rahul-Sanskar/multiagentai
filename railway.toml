[build]
builder = "nixpacks"
buildCommand = "pip install --upgrade pip setuptools wheel && pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu --only-binary=:all: && pip install -r requirements.txt --only-binary=:all:"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
